<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Switch HQ — Application Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      font-size: 14px;
    }
    .shell {
      max-width: 1000px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }
    /* ─── Header ─────────────────────────────────── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      gap: 1rem;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
    }
    .header-actions {
      display: flex;
      gap: 0.75rem;
    }
    /* ─── Funnel Stats ───────────────────────────── */
    .funnel-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: #fff;
      border: 0.5px solid #d3d1c7;
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
    .stat-card .number {
      font-size: 28px;
      font-weight: 700;
      color: #0c447c;
    }
    .stat-card .label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }
    /* ─── Input & Button Styles ──────────────────── */
    input,
    select,
    textarea {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 0.5px solid #d3d1c7;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      width: 100%;
    }
    input:focus,
    select:focus,
    textarea:focus {
      border-color: #888;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    button {
      font-family: inherit;
      font-size: 13px;
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #0c447c;
      color: #fff;
      font-weight: 500;
      transition: background 0.2s;
    }
    button:hover {
      background: #082f54;
    }
    button.secondary {
      background: #e6e6e0;
      color: #1a1a1a;
    }
    button.secondary:hover {
      background: #d3d1c7;
    }
    button.small {
      padding: 4px 8px;
      font-size: 12px;
    }
    button.success {
      background: #085041;
    }
    button.success:hover {
      background: #063a2e;
    }
    /* ─── Modal ──────────────────────────────────── */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal {
      background: #fff;
      border-radius: 14px;
      padding: 1.5rem;
      width: 100%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      color: #666;
    }
    .modal-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 2rem;
    }
    .modal-actions button {
      flex: 1;
    }
    /* ─── Application Cards ──────────────────────── */
    .applications-list {
      display: grid;
      gap: 1.5rem;
      margin-top: 1.5rem;
    }
    .app-card {
      background: #fff;
      border: 0.5px solid #d3d1c7;
      border-radius: 12px;
      padding: 1.5rem;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 1rem;
      gap: 1rem;
    }
    .app-title-group h2 {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 0.25rem;
    }
    .app-title-group p {
      font-size: 13px;
      color: #666;
    }
    .tag {
      display: inline-block;
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 4px;
      font-weight: 500;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .tag.status {
      background: #e6f1fb;
      color: #0c447c;
    }
    .tag.source {
      background: #faeeda;
      color: #633806;
    }
    .tag.warning {
      background: #fcebeb;
      color: #a32d2d;
    }
    .app-section {
      margin-top: 1.25rem;
      padding-top: 1.25rem;
      border-top: 0.5px solid #e6e6e0;
    }
    .section-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 0.75rem;
    }
    .section-content {
      display: grid;
      gap: 0.75rem;
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .field {
      display: flex;
      flex-direction: column;
    }
    .field label {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }
    .field-value {
      font-size: 13px;
      color: #1a1a1a;
      padding: 6px 0;
    }
    .field input[type="date"],
    .field input[type="text"],
    .field select {
      font-size: 12px;
      padding: 6px 8px;
      width: 100%;
    }
    /* ─── Interview Round ────────────────────────── */
    .interview-round {
      background: #fafaf8;
      border: 0.5px solid #e6e6e0;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
    }
    .round-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .round-type {
      font-weight: 600;
      color: #0c447c;
    }
    /* ─── Edge Case Banners ──────────────────────── */
    .banner {
      padding: 0.75rem 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .banner.warning {
      background: #fcebeb;
      color: #a32d2d;
      border-left: 3px solid #a32d2d;
    }
    .banner.info {
      background: #eaf3de;
      color: #27500a;
      border-left: 3px solid #27500a;
    }
    .banner.action {
      background: #e6f1fb;
      color: #0c447c;
      border-left: 3px solid #0c447c;
    }
    /* ─── Checkbox ────────────────────────────────── */
    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .checkbox-group input[type="checkbox"] {
      width: auto;
      height: 18px;
      width: 18px;
      cursor: pointer;
    }
    /* ─── Prep Kit ────────────────────────────────── */
    .prep-kit {
      background: #fafaf8;
      border-radius: 8px;
      padding: 1rem;
    }
    .prep-kit-section {
      margin-bottom: 1rem;
    }
    .prep-kit-section:last-child {
      margin-bottom: 0;
    }
    .prep-kit-title {
      font-size: 12px;
      font-weight: 700;
      color: #0c447c;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }
    .prep-kit-content {
      font-size: 12px;
      line-height: 1.5;
      color: #555;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    /* ─── Empty State ────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: #888;
    }
    .empty-state svg {
      width: 60px;
      height: 60px;
      margin-bottom: 1rem;
      opacity: 0.3;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div id="root"></div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useRef } = React;

    // ── CONSTANTS ────────────────────────────────────
    const SOURCES = ["Alumni Referral", "Direct Outreach", "LinkedIn Easy Apply", "Company Portal", "Inbound Recruiter"];
    const RESUME_TYPES = ["Program Manager", "Growth", "Product"];
    const STATUSES = ["Pre-Outreach", "Applied", "Recruiter Screen", "Technical/Case", "Final Round", "Rejected", "Ghosted", "Offer!"];
    const REJECTION_STAGES = ["ATS / Never Reviewed", "Resume Reviewed Not Shortlisted"];
    const INTERVIEW_TYPES = ["Recruiter Screen", "Hiring Manager", "Case Study / Tech", "Final / Culture Fit"];
    const SKEY = "gunadeep_job_hq_v1";
    const GAS_URL = "https://script.google.com/macros/s/AKfycbz3R3oi3-becUv7jTHxVOg8kd2-dW8aFsZjnpksd1xl7HbRpmWZs1jUg-7ThWDl-rb5/exec"; // Set this to your Google Apps Script URL

    // ── HELPERS ──────────────────────────────────────
    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }
    function daysAgo(date, days) {
      const d = new Date(date);
      const now = new Date();
      return (now - d) / (1000 * 60 * 60 * 24) >= days;
    }
    function daysUntil(date) {
      const d = new Date(date);
      const now = new Date();
      return Math.ceil((d - now) / (1000 * 60 * 60 * 24));
    }

    // ── MAIN APP ─────────────────────────────────────
    function JobTrackerApp() {
      const [apps, setApps] = useState([]);
      const [showModal, setShowModal] = useState(false);
      const [syncStatus, setSyncStatus] = useState("ready");

      // Load from localStorage
      useEffect(() => {
        const saved = localStorage.getItem(SKEY);
        if (saved) {
          try {
            setApps(JSON.parse(saved));
          } catch (e) {
            console.error("Load failed:", e);
          }
        }
      }, []);

      // Save to localStorage + Google Sheets
      const saveApps = useCallback(
        (newApps) => {
          setApps(newApps);
          localStorage.setItem(SKEY, JSON.stringify(newApps));
          syncToSheets(newApps);
        },
        []
      );

      const syncToSheets = async (data) => {
        if (!GAS_URL) return;
        try {
          setSyncStatus("syncing");
          // Convert to sheet format (Phase 1 columns A-S)
          const payload = JSON.stringify({
            apps: data,
            timestamp: new Date().toISOString(),
          });
          await fetch(GAS_URL, {
            method: "POST",
            body: payload,
          });
          setSyncStatus("synced");
          setTimeout(() => setSyncStatus("ready"), 2000);
        } catch (e) {
          setSyncStatus("error");
        }
      };

      // Add new application
      const addApp = useCallback(
        (appData) => {
          const newApp = {
            id: Date.now(),
            ...appData,
            createdAt: todayStr(),
            interviews: [],
            prepKit: null,
          };
          saveApps([...apps, newApp]);
          setShowModal(false);
        },
        [apps, saveApps]
      );

      // Update application
      const updateApp = useCallback(
        (id, updates) => {
          saveApps(apps.map((a) => (a.id === id ? { ...a, ...updates } : a)));
        },
        [apps, saveApps]
      );

      // Delete application
      const deleteApp = useCallback(
        (id) => {
          if (confirm("Delete this application?")) {
            saveApps(apps.filter((a) => a.id !== id));
          }
        },
        [apps, saveApps]
      );

      // Add interview round
      const addInterview = useCallback(
        (appId, roundData) => {
          updateApp(appId, {
            interviews: [
              ...(apps.find((a) => a.id === appId)?.interviews || []),
              { id: Date.now(), ...roundData },
            ],
          });
        },
        [apps, updateApp]
      );

      // Calculate funnel
      const stats = {
        total: apps.length,
        interviews: apps.filter((a) => a.interviews?.length > 0).length,
        offers: apps.filter((a) => a.currentStatus === "Offer!").length,
      };

      return (
        <div>
          <div className="header">
            <h1>Job Switch HQ</h1>
            <div className="header-actions">
              <button onClick={() => setShowModal(true)}>+ Quick Add</button>
              <div style={{ fontSize: "11px", color: "#999" }}>
                {syncStatus === "syncing" && "Syncing..."}
                {syncStatus === "synced" && "✓ Synced"}
                {syncStatus === "error" && "✗ Sync failed"}
              </div>
            </div>
          </div>

          <div className="funnel-stats">
            <div className="stat-card">
              <div className="number">{stats.total}</div>
              <div className="label">Applications</div>
            </div>
            <div className="stat-card">
              <div className="number">{stats.interviews}</div>
              <div className="label">In Interviews</div>
            </div>
            <div className="stat-card">
              <div className="number">{stats.offers}</div>
              <div className="label">Offers</div>
            </div>
          </div>

          {showModal && (
            <QuickAddModal
              onAdd={addApp}
              onClose={() => setShowModal(false)}
            />
          )}

          {apps.length === 0 ? (
            <div className="empty-state">
              <p>No applications yet. Click "Quick Add" to get started.</p>
            </div>
          ) : (
            <div className="applications-list">
              {apps.map((app) => (
                <ApplicationCard
                  key={app.id}
                  app={app}
                  onUpdate={updateApp}
                  onDelete={deleteApp}
                  onAddInterview={addInterview}
                />
              ))}
            </div>
          )}
        </div>
      );
    }

    // ── QUICK ADD MODAL ──────────────────────────────
    function QuickAddModal({ onAdd, onClose }) {
      const [formData, setFormData] = useState({
        companyName: "",
        roleTitle: "",
        jdLink: "",
        jdText: "",
        source: "Direct Outreach",
        resumeUsed: "Program Manager",
      });

      const handleSubmit = () => {
        if (!formData.companyName || !formData.roleTitle) {
          alert("Company and Role are required");
          return;
        }
        onAdd({
          companyName: formData.companyName,
          roleTitle: formData.roleTitle,
          jdLink: formData.jdLink,
          jdText: formData.jdText,
          source: formData.source,
          resumeUsed: formData.resumeUsed,
          currentStatus: ["Direct Outreach", "LinkedIn Easy Apply", "Company Portal"].includes(formData.source)
            ? "Applied"
            : "Pre-Outreach",
          applicationDate: ["Direct Outreach", "LinkedIn Easy Apply", "Company Portal"].includes(formData.source)
            ? todayStr()
            : null,
          outreachDate: null,
          targetContactName: null,
          contactReplied: false,
          referralSecured: false,
        });
      };

      const isDirect = ["Direct Outreach", "LinkedIn Easy Apply", "Company Portal"].includes(formData.source);

      return (
        <div className="modal-backdrop">
          <div className="modal">
            <div className="modal-title">Quick Add Application</div>

            <div className="form-group">
              <label>Company Name *</label>
              <input
                type="text"
                value={formData.companyName}
                onChange={(e) =>
                  setFormData({ ...formData, companyName: e.target.value })
                }
                placeholder="e.g., Google"
              />
            </div>

            <div className="form-group">
              <label>Role Title *</label>
              <input
                type="text"
                value={formData.roleTitle}
                onChange={(e) =>
                  setFormData({ ...formData, roleTitle: e.target.value })
                }
                placeholder="e.g., Program Manager"
              />
            </div>

            <div className="form-group">
              <label>Source</label>
              <select
                value={formData.source}
                onChange={(e) =>
                  setFormData({ ...formData, source: e.target.value })
                }
              >
                {SOURCES.map((s) => (
                  <option key={s} value={s}>
                    {s}
                  </option>
                ))}
              </select>
            </div>

            <div className="form-group">
              <label>Resume Type</label>
              <select
                value={formData.resumeUsed}
                onChange={(e) =>
                  setFormData({ ...formData, resumeUsed: e.target.value })
                }
              >
                {RESUME_TYPES.map((r) => (
                  <option key={r} value={r}>
                    {r}
                  </option>
                ))}
              </select>
            </div>

            <div className="form-group">
              <label>JD Link (optional)</label>
              <input
                type="text"
                value={formData.jdLink}
                onChange={(e) =>
                  setFormData({ ...formData, jdLink: e.target.value })
                }
                placeholder="https://..."
              />
            </div>

            <div className="form-group">
              <label>JD Text (optional)</label>
              <textarea
                value={formData.jdText}
                onChange={(e) =>
                  setFormData({ ...formData, jdText: e.target.value })
                }
                placeholder="Paste JD here for prep kit generation"
              />
            </div>

            <div className="modal-actions">
              <button className="secondary" onClick={onClose}>
                Cancel
              </button>
              <button className="success" onClick={handleSubmit}>
                {isDirect ? "Save & Applied" : "Save & Plan"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ── APPLICATION CARD ─────────────────────────────
    function ApplicationCard({ app, onUpdate, onDelete, onAddInterview }) {
      const [expandInterview, setExpandInterview] = useState(false);
      const [expandPrepKit, setExpandPrepKit] = useState(false);
      const [newInterview, setNewInterview] = useState({
        type: "Recruiter Screen",
        date: todayStr(),
        outcome: "Awaiting",
      });

      // Edge case: 4-day outreach rule
      const showApplyBanner =
        app.source === "Alumni Referral" &&
        !app.referralSecured &&
        app.outreachDate &&
        daysAgo(app.outreachDate, 4);

      // Edge case: 14-day ghosted rule
      const isGhosted =
        app.currentStatus === "Applied" &&
        app.applicationDate &&
        daysAgo(app.applicationDate, 14);

      // Status color mapping
      const statusColors = {
        "Pre-Outreach": "#F1EFE8",
        Applied: "#E6F1FB",
        "Recruiter Screen": "#EEEDFE",
        "Technical/Case": "#EAF3DE",
        "Final Round": "#EEEDFE",
        Rejected: "#FCEBEB",
        Ghosted: "#F1EFE8",
        "Offer!": "#E1F5EE",
      };

      return (
        <div className="app-card">
          {/* EDGE CASE: 4-day Outreach Rule */}
          {showApplyBanner && (
            <div className="banner action">
              <span>No response after 4 days. Ready to apply directly?</span>
              <button
                className="small secondary"
                onClick={() => {
                  onUpdate(app.id, {
                    currentStatus: "Applied",
                    applicationDate: todayStr(),
                  });
                }}
              >
                Apply Now
              </button>
            </div>
          )}

          {/* EDGE CASE: Ghosted Warning */}
          {isGhosted && (
            <div className="banner warning">
              <span>
                No response for 14 days. Mark as Ghosted or follow up?
              </span>
            </div>
          )}

          {/* Header */}
          <div className="app-header">
            <div className="app-title-group">
              <h2>{app.companyName}</h2>
              <p>{app.roleTitle}</p>
              <div style={{ marginTop: "0.5rem" }}>
                <span
                  className="tag status"
                  style={{ backgroundColor: statusColors[app.currentStatus] }}
                >
                  {app.currentStatus}
                </span>
                <span className="tag source">{app.source}</span>
              </div>
            </div>
            <div>
              <button
                className="small secondary"
                onClick={() => onDelete(app.id)}
              >
                Delete
              </button>
            </div>
          </div>

          {/* APPLICATION PATH SECTION */}
          <div className="app-section">
            <div className="section-title">Application Path</div>
            <div className="section-content">
              {["Direct Outreach", "Alumni Referral"].includes(app.source) ? (
                // OUTREACH PATH
                <div>
                  <div className="field-row">
                    <div className="field">
                      <label>Target Contact</label>
                      <input
                        type="text"
                        value={app.targetContactName || ""}
                        onChange={(e) =>
                          onUpdate(app.id, {
                            targetContactName: e.target.value,
                          })
                        }
                        placeholder="Name of person"
                      />
                    </div>
                    <div className="field">
                      <label>Outreach Date</label>
                      <input
                        type="date"
                        value={app.outreachDate || ""}
                        onChange={(e) =>
                          onUpdate(app.id, { outreachDate: e.target.value })
                        }
                      />
                    </div>
                  </div>
                  <div className="field-row">
                    <div className="field">
                      <label>Contact Replied?</label>
                      <div className="checkbox-group">
                        <input
                          type="checkbox"
                          checked={app.contactReplied || false}
                          onChange={(e) =>
                            onUpdate(app.id, {
                              contactReplied: e.target.checked,
                            })
                          }
                        />
                        <span>{app.contactReplied ? "Yes" : "No"}</span>
                      </div>
                    </div>
                    <div className="field">
                      <label>Referral Secured?</label>
                      <div className="checkbox-group">
                        <input
                          type="checkbox"
                          checked={app.referralSecured || false}
                          onChange={(e) => {
                            onUpdate(app.id, {
                              referralSecured: e.target.checked,
                              currentStatus: e.target.checked
                                ? "Applied"
                                : "Pre-Outreach",
                              applicationDate: e.target.checked
                                ? todayStr()
                                : null,
                            });
                          }}
                        />
                        <span>{app.referralSecured ? "Yes" : "No"}</span>
                      </div>
                    </div>
                  </div>
                </div>
              ) : (
                // DIRECT APPLY PATH
                <div className="field-row">
                  <div className="field">
                    <label>Application Date</label>
                    <input
                      type="date"
                      value={app.applicationDate || ""}
                      onChange={(e) =>
                        onUpdate(app.id, { applicationDate: e.target.value })
                      }
                    />
                  </div>
                  <div className="field">
                    <label>Resume Used</label>
                    <input
                      type="text"
                      value={app.resumeUsed || ""}
                      disabled
                    />
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* STATUS & DIAGNOSTICS */}
          <div className="app-section">
            <div className="section-title">Status & Diagnostics</div>
            <div className="section-content">
              <div className="field">
                <label>Current Status</label>
                <select
                  value={app.currentStatus}
                  onChange={(e) =>
                    onUpdate(app.id, { currentStatus: e.target.value })
                  }
                >
                  {STATUSES.map((s) => (
                    <option key={s} value={s}>
                      {s}
                    </option>
                  ))}
                </select>
              </div>

              {/* Rejection Stage (if Rejected) */}
              {app.currentStatus === "Rejected" && (
                <div className="field">
                  <label>Rejection Stage</label>
                  <select
                    value={app.rejectionStage || ""}
                    onChange={(e) =>
                      onUpdate(app.id, { rejectionStage: e.target.value })
                    }
                  >
                    <option value="">Select...</option>
                    {REJECTION_STAGES.map((s) => (
                      <option key={s} value={s}>
                        {s}
                      </option>
                    ))}
                  </select>
                </div>
              )}

              {/* Diagnostic Notes */}
              <div className="field">
                <label>Diagnostic Notes</label>
                <textarea
                  value={app.diagnosticNotes || ""}
                  onChange={(e) =>
                    onUpdate(app.id, { diagnosticNotes: e.target.value })
                  }
                  placeholder="e.g., Got rejected at R2. Need to translate my ASO metrics better for SaaS roles."
                />
              </div>

              {/* Expected Comp */}
              <div className="field-row">
                <div className="field">
                  <label>Expected Comp / Target Salary</label>
                  <input
                    type="number"
                    value={app.expectedComp || ""}
                    onChange={(e) =>
                      onUpdate(app.id, { expectedComp: e.target.value })
                    }
                    placeholder="Base + Equity"
                  />
                </div>
                <div className="field">
                  <label>Final Offer Amount</label>
                  <input
                    type="number"
                    value={app.finalOfferAmount || ""}
                    onChange={(e) =>
                      onUpdate(app.id, { finalOfferAmount: e.target.value })
                    }
                    placeholder="Actual offer"
                  />
                </div>
              </div>
            </div>
          </div>

          {/* INTERVIEW TRACKER */}
          <div className="app-section">
            <div
              className="section-title"
              style={{ cursor: "pointer" }}
              onClick={() => setExpandInterview(!expandInterview)}
            >
              {expandInterview ? "▼" : "▶"} Interview Rounds (
              {app.interviews?.length || 0})
            </div>
            {expandInterview && (
              <div className="section-content">
                {app.interviews?.map((r) => (
                  <InterviewRound
                    key={r.id}
                    round={r}
                    onUpdate={(updates) => {
                      onUpdate(app.id, {
                        interviews: app.interviews.map((iv) =>
                          iv.id === r.id ? { ...iv, ...updates } : iv
                        ),
                      });
                    }}
                    onDelete={() => {
                      onUpdate(app.id, {
                        interviews: app.interviews.filter((iv) => iv.id !== r.id),
                      });
                    }}
                  />
                ))}

                <div style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "0.5px solid #e6e6e0" }}>
                  <div className="field-row">
                    <div className="field">
                      <label>Round Type</label>
                      <select
                        value={newInterview.type}
                        onChange={(e) =>
                          setNewInterview({ ...newInterview, type: e.target.value })
                        }
                      >
                        {INTERVIEW_TYPES.map((t) => (
                          <option key={t} value={t}>
                            {t}
                          </option>
                        ))}
                      </select>
                    </div>
                    <div className="field">
                      <label>Date</label>
                      <input
                        type="date"
                        value={newInterview.date}
                        onChange={(e) =>
                          setNewInterview({ ...newInterview, date: e.target.value })
                        }
                      />
                    </div>
                  </div>
                  <button
                    className="small"
                    onClick={() => {
                      onAddInterview(app.id, newInterview);
                      setNewInterview({
                        type: "Recruiter Screen",
                        date: todayStr(),
                        outcome: "Awaiting",
                      });
                    }}
                    style={{ marginTop: "0.75rem" }}
                  >
                    Add Round
                  </button>
                </div>
              </div>
            )}
          </div>

          {/* PREP KIT */}
          {app.jdText && (
            <div className="app-section">
              <div
                className="section-title"
                style={{ cursor: "pointer" }}
                onClick={() => setExpandPrepKit(!expandPrepKit)}
              >
                {expandPrepKit ? "▼" : "▶"} Prep Kit
              </div>
              {expandPrepKit && (
                <div className="prep-kit">
                  <PrepKit jd={app.jdText} company={app.companyName} />
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    // ── INTERVIEW ROUND COMPONENT ────────────────────
    function InterviewRound({ round, onUpdate, onDelete }) {
      return (
        <div className="interview-round">
          <div className="round-title">
            <span className="round-type">{round.type}</span>
            <button
              className="small secondary"
              onClick={onDelete}
            >
              Remove
            </button>
          </div>
          <div className="field-row">
            <div className="field">
              <label>Date</label>
              <input
                type="date"
                value={round.date}
                onChange={(e) => onUpdate({ date: e.target.value })}
              />
            </div>
            <div className="field">
              <label>Interviewer Name</label>
              <input
                type="text"
                value={round.interviewerName || ""}
                onChange={(e) => onUpdate({ interviewerName: e.target.value })}
                placeholder="Optional"
              />
            </div>
          </div>
          <div className="field-row">
            <div className="field">
              <label>Outcome</label>
              <select
                value={round.outcome || "Awaiting"}
                onChange={(e) => onUpdate({ outcome: e.target.value })}
              >
                <option value="Awaiting">Awaiting</option>
                <option value="Passed">Passed</option>
                <option value="Rejected">Rejected</option>
              </select>
            </div>
            <div className="field">
              <label>Prep Done?</label>
              <div className="checkbox-group">
                <input
                  type="checkbox"
                  checked={round.prepDone || false}
                  onChange={(e) => onUpdate({ prepDone: e.target.checked })}
                />
                <span>{round.prepDone ? "Yes" : "No"}</span>
              </div>
            </div>
          </div>
          <div className="field">
            <label>Thank You Note Sent?</label>
            <div className="checkbox-group">
              <input
                type="checkbox"
                checked={round.thankYouSent || false}
                onChange={(e) => onUpdate({ thankYouSent: e.target.checked })}
              />
              <span>{round.thankYouSent ? "Yes" : "No"}</span>
            </div>
          </div>
          <div className="field">
            <label>Notes</label>
            <textarea
              value={round.notes || ""}
              onChange={(e) => onUpdate({ notes: e.target.value })}
              placeholder="Interview notes..."
            />
          </div>
        </div>
      );
    }

    // ── PREP KIT GENERATOR ────────────────────────────
    function PrepKit({ jd, company }) {
      const [prepKit, setPrepKit] = useState(() => generatePrepKit(jd, company));

      return (
        <div>
          <div className="prep-kit-section">
            <div className="prep-kit-title">Company Research</div>
            <div className="prep-kit-content">
              {prepKit.companyResearch}
            </div>
          </div>
          <div className="prep-kit-section">
            <div className="prep-kit-title">Role Expectations</div>
            <div className="prep-kit-content">
              {prepKit.roleExpectations}
            </div>
          </div>
          <div className="prep-kit-section">
            <div className="prep-kit-title">Likely Questions</div>
            <div className="prep-kit-content">
              {prepKit.likelyQuestions.join("\n\n")}
            </div>
          </div>
          <div className="prep-kit-section">
            <label>Custom Notes</label>
            <textarea
              value={prepKit.customNotes || ""}
              onChange={(e) => setPrepKit({ ...prepKit, customNotes: e.target.value })}
              style={{ marginTop: "0.5rem" }}
            />
          </div>
        </div>
      );
    }

    function generatePrepKit(jd, company) {
      const jdLower = jd.toLowerCase();
      
      // Detect company type
      let companyType = "corporate";
      if (/startup|seed|series/.test(jdLower)) companyType = "startup";
      if (/consulting|mckinsey|bcg|deloitte/.test(jdLower)) companyType = "consulting";
      if (/bank|financial|fintech/.test(jdLower)) companyType = "bfsi";
      
      // Extract key keywords
      const keywords = [];
      if (/program manager|pm\b/.test(jdLower)) keywords.push("Program Management", "Governance", "Cross-functional");
      if (/growth|acquisition|user/.test(jdLower)) keywords.push("Growth Strategy", "Product Analytics", "Metrics");
      if (/product|aso|seo|conversion/.test(jdLower)) keywords.push("Product Strategy", "User Behavior", "Experimentation");
      if (/operations|ops|process/.test(jdLower)) keywords.push("Operational Excellence", "Process Design", "Scalability");
      
      return {
        companyResearch: `About ${company}:\n• Find their latest news/funding rounds\n• Understand their business model\n• Check their growth metrics (if public)\n• Identify recent product launches or initiatives`,
        
        roleExpectations: `This role seems to focus on:\n${keywords.map(k => `• ${k}`).join("\n")}\n\nBe ready to discuss your experience in these areas with specific metrics.`,
        
        likelyQuestions: [
          "Walk me through your most complex project",
          "Tell me about a time you drove measurable growth/impact",
          `How do you measure success in a ${companyType === "startup" ? "startup" : "scaling"} environment?`,
          "Describe your process for solving ambiguous problems",
          `What attracted you to ${company} specifically?`,
        ],
        
        customNotes: "",
      };
    }

    // ── RENDER ────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById("root")).render(
      <JobTrackerApp />
    );
  </script>
</body>
</html>
