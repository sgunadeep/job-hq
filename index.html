function getWeekKey(date){const d=new Date(date);const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d.setDate(diff));return mon.toISOString().slice(0,10);}
function weeksAgo(n){const d=new Date();d.setDate(d.getDate()-n*7);return getWeekKey(d);}
function todayStr(){return new Date().toISOString().slice(0,10);}
const STOP=new Set("a an the and or but in on at to for of with by from as is are was were be been being have has had do does did will would could should may might shall can this that these those i you he she it we they all any each more most other into its if not no nor so yet both either neither than then when where how what which who their there through during before after above below between out about against".split(" "));
function extractKW(text){
  const words=text.toLowerCase().replace(/[^a-z0-9\s]/g," ").split(/\s+/).filter(w=>w.length>3&&!STOP.has(w));
  const bigrams=[];for(let i=0;i<words.length-1;i++){if(!STOP.has(words[i])&&!STOP.has(words[i+1]))bigrams.push(words[i]+" "+words[i+1]);}
  const freq={};[...words,...bigrams].forEach(w=>{freq[w]=(freq[w]||0)+1;});
  return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,60).map(e=>e[0]);
}
function scoreText(text,terms){return terms.reduce((s,t)=>s+(text.toLowerCase().includes(t)?1:0),0);}
function buildResumeText(rid){const r=RESUME[rid];const role=ROLES_T.find(x=>x.id===rid);let t=`TARGET ROLE: ${role.label}\nHEADLINE: ${r.headline}\n\nSUMMARY:\n${r.summary}\n\nEXPERIENCE AT CARS24 (${CONTACT.cars24desc}):\n`;r.sections.forEach(s=>{t+=`\n${s.role} | ${s.dates}\n`;s.bullets.forEach(b=>t+=`• ${b}\n`);});t+=`\nEDUCATION: B.Tech Civil Engineering, IIT (BHU) Varanasi, 2015-2019`;return t;}

function detectCompanyType(jd){
  const j=jd.toLowerCase();
  if(/deloitte|ey\b|kpmg|accenture|mckinsey|bcg|pwc|consult/i.test(jd))return"consulting";
  if(/gcc|global capability|captive|shared service|centre of excellence/i.test(jd))return"gcc";
  if(/series [a-e]|seed stage|growth stage|startup|founded in 20|venture/i.test(jd))return"startup";
  if(/bank|financial services|insurance|nbfc|fintech|wells fargo|hdfc|icici/i.test(jd))return"bfsi";
  if(/pharma|healthcar|novartis|siemens|medical/i.test(jd))return"healthcare";
  return"corporate";
}

function detectBestRole(jd){

    pom:scoreText(j,["product","aso","seo","crm","mau","dau","retention","funnel","conversion","automation","product analytics","feature","roadmap","a/b test"]),

function extractJDMeta(jdText){
  const lines=jdText.split('\n').map(l=>l.trim()).filter(l=>l.length>2);
  let company="This Company",roleTitle="This Role";
  for(const l of lines.slice(0,6)){if(l.length>3&&l.length<60&&!/^(about|we are|we're|job|role|position|responsibilities|requirements|qualifications|overview)/i.test(l)){if(company==="This Company")company=l;else if(roleTitle==="This Role"){roleTitle=l;break;}}}
  const rtLine=lines.find(l=>/manager|director|analyst|specialist|associate|head|lead|officer|executive|engineer/i.test(l)&&l.length<80);
  if(rtLine)roleTitle=rtLine;
  return{company,roleTitle};
}

    {tags:["failure","mistake","challenge","difficult","setback","wrong"],q:"Tell me about a significant failure.",a:`SITUATION: In the initial 15-city expansion, my city selection model prioritised speed over local market readiness. Two cities underperformed significantly in month 2 — vehicle cataloguing was 40% below target.

ACTION: I paused the remaining rollout, did a root cause analysis with the city ops leads, and rebuilt the selection model to weight local competition density and vendor availability as primary variables — not just vehicle density.

RESULT: The revised approach delayed full rollout by 3 weeks but delivered 32% market penetration growth overall. The two underperforming cities improved to 80% of target within 45 days.

LESSON: I now always run a 'pre-mortem' on any expansion plan — explicitly asking what would make this fail, before committing to timelines.

WHAT TO AVOID: Never pick a trivial failure. Never say "I work too hard." Pick something real where you made a genuine mistake and show the learning.`,tip:"Interviewers respect candidates who own real failures with specific detail. Vague failures signal defensiveness."},
  ];
  // Score each question against JD
  const scored=allQs.map(q=>({...q,score:scoreText(j,q.tags)})).sort((a,b)=>b.score-a.score);
  return scored.slice(0,6);
}

function genGuesstimates(jd,companyType){
  const j=jd.toLowerCase();
  const qs=[];
  // Always include one India market sizing
  qs.push({q:"How many used cars are sold in India per month?",approach:`STRUCTURE:
1. India population: 1.4B → households: ~350M → ~15% own a car = 52M car-owning households
2. Average car replacement cycle: 8 years → 52M ÷ 8 = 6.5M cars replaced/year
3. New vs used split: ~65% used in India → 4.2M used car transactions/year
4. Monthly: 4.2M ÷ 12 = ~350K used cars per month

ANSWER: ~300-400K per month. Cars24 processes a meaningful share of this.

WHY THIS MATTERS FOR YOUR INTERVIEW: You've worked at Cars24 for 6 years. If you don't know this number, it looks bad. Know the market you came from.`,note:"You should actually know this from your work. Anchor your answer with Cars24 data if you have it."});

  if(/product|growth|user|app|digital/i.test(jd)){
    qs.push({q:"Estimate the number of monthly active users of a major Indian job portal (e.g. Naukri).",approach:`STRUCTURE:
1. India workforce: ~500M. White-collar seekers actively looking: ~15M at any time
2. Passive browsing (not actively seeking): 3x active seekers = ~45M potential users
3. Naukri market share in job portals: ~40%
4. Engagement: of 45M potential, 30% visit monthly = ~13M
5. Rough estimate: 10-15M MAU

SANITY CHECK: Naukri is publicly listed. Their reported numbers are ~75M registered users, ~15M monthly active. This is a reasonable estimate.

INTERVIEWER WANTS: Structured decomposition, not the right number. Show your tree.`});
  }
  if(/operations|ops|supply|logistics|efficiency/i.test(jd)){
    qs.push({q:"How would you estimate the cost of running a 100-person operations centre in Hyderabad for a year?",approach:`STRUCTURE:
People costs (70% of total):
• 100 people avg CTC ₹8L = ₹8Cr/year
Infrastructure (20%):
• Office space: 100 people × 75 sqft = 7,500 sqft × ₹80/sqft/month × 12 = ₹72L
• IT/equipment: 100 × ₹1L = ₹1Cr
• Utilities, admin: ₹30L
Total infra: ~₹2Cr
Other (training, attrition, HR): ~₹1Cr

TOTAL: ~₹11Cr/year (~$1.3M)

WHY THIS MATTERS: Ops interviewers want to see you think in cost structures, not just delivery metrics.`});
  }
  if(/consulting|strategy|market|revenue|business/i.test(jd)){
    qs.push({q:"Estimate the revenue of the Indian management consulting market.",approach:`STRUCTURE:
1. India has ~5,000 consulting firms (Big 4 + boutiques)
2. Big 4 India revenue (public data): Deloitte ~₹8K Cr, EY ~₹6K Cr, KPMG ~₹4K Cr, PwC ~₹5K Cr = ₹23K Cr for Big 4
3. Big 4 = ~40% of the market
4. Total market: ₹23K Cr ÷ 0.4 = ~₹57K Cr (~$7B)
5. Growing at 12-15% YOY

ANSWER: ~$6-8B, growing double-digit.

CONSULTING FIRM INTERVIEWS: They want to see you use public data as anchor points, then triangulate.`});
  }
  // Always add a "think out loud" guidance note
  qs.push({q:"General guesstimate approach — what interviewers are actually evaluating",approach:`THEY ARE SCORING YOU ON:
1. STRUCTURE — Do you build a clear tree before calculating?
2. ASSUMPTIONS — Do you state them explicitly? ("I'm assuming India has X households")
3. REASONABLENESS — Do your numbers pass a gut-check?
4. RECOVERY — When they push back ("what if you're wrong?"), do you adjust cleanly?

THE FORMULA:
• State the approach first (30 seconds): "I'll estimate this by breaking it into [X] and [Y]"
• Clarify if needed: "Should I focus on revenue or volume?"
• Build top-down, state each assumption
• Sanity check your final number
• Invite pushback: "Does that directionally align with what you'd expect?"

WHAT TO AVOID:
• Starting to calculate immediately without structure
• Getting flustered when pushed back
• Saying "I'm not sure" without attempting a framework
• Giving a range so wide it's useless ("between 1 and 100 million")`});
  return qs.slice(0,4);
}

function genCulture(company,companyType){
  const typeNotes={
    consulting:`${company} will probe whether you can handle high ambiguity, client pressure, and fast-moving contexts. They also test intellectual humility — consulting culture values people who say "I don't know, but here's how I'd find out."`,
    gcc:`${company} GCC will test whether you understand the GCC operating model — India teams often have execution ownership but limited strategic input. Show you're comfortable with that structure while making clear you can add strategic value.`,
    startup:`${company} will probe culture fit hard — they hire for values alignment as much as skills. Know their mission, know their product, and have a specific view on why you want to build here vs a more established company.`,
    bfsi:`${company} will value process rigour, compliance mindset, and structured problem solving. Show that you understand the cost of operational errors in a regulated environment.`,
    healthcare:`${company} values attention to detail, regulatory awareness, and long-term thinking. Show patience with process and an understanding that speed ≠ recklessness here.`,
    corporate:`Research ${company}'s stated values and recent news before the interview. Reference something specific — it signals genuine interest, not just job-seeking.`,
  };
  return{
    typeNote:typeNotes[companyType]||typeNotes.corporate,
    questions:[
      {q:"Why this company specifically?",script:`SCRIPT: "Two reasons. First, [COMPANY-SPECIFIC REASON — find something real from their website, news, or the JD itself]. Second, I've deliberately looked for environments where someone with my background — broad scope, P&L ownership, 0→1 execution — can work at the level I've actually been operating at. That combination is rare, and I see it here."\n\nWHAT TO AVOID: "Great company, great culture" — every candidate says this. You must name one specific thing about this company that isn't true of 10 others.`,tip:"Spend 20 minutes on their website before the interview. Find one recent announcement, initiative, or challenge to reference."},
      {q:"Describe your ideal work environment.",script:`SCRIPT: "I work best in environments where the problem isn't fully defined yet — where I'm brought in to structure the ambiguity, not just execute against a pre-existing playbook. I like working with smart people who push back on my thinking. And I work best when I can see the full outcome — not just my slice of a larger project. That's been true in every role I've thrived in at Cars24."\n\nWHAT TO AVOID: Don't describe the perfect employer. Describe the conditions under which YOU perform best. This is about self-awareness.`,tip:"This question is a culture-fit probe. Match your answer to signals from the JD — if they emphasise autonomy, lean into that."},
      {q:"How do you handle disagreement with a manager or senior stakeholder?",script:`SCRIPT: "I separate the issue from the relationship. If I disagree, I'll say so once — clearly and with data — and then commit to the decision, whatever it is. I don't relitigate. In the Founders Office, I surfaced an analysis that contradicted the initial homepage redesign approach. My manager disagreed. I presented my case once with the engagement data, they made a call, I executed it fully. The relationship stays intact when you make your case cleanly and then move on."\n\nWHAT TO AVOID: Don't say "I always defer to my manager." Don't say "I always push until they agree." Show that you disagree and commit — that's the answer senior interviewers want.`,tip:"'Disagree and commit' is the phrase that lands at senior level. Use it explicitly if it feels natural."},
      {q:"What's your biggest weakness?",script:`SCRIPT: "I have high standards for the work, and I've historically struggled to delegate tasks I know I could do faster myself. I've been working on this consciously — in the 15-city expansion, I forced myself to let city ops leads own their metrics even when I could see gaps I could fix. The constraint of not being in all 15 cities at once helped me build that muscle. I'm a better delegator now, though it's still something I monitor."\n\nWHAT TO AVOID: Fake weaknesses ("I work too hard," "I'm a perfectionist"). They know, and it wastes their time. Pick something real with a real mitigation. The above is real for your profile.`,tip:"The best weakness answers show genuine self-awareness AND evidence you're working on it. Not just the problem, and not just the fix."},
    ]
  };
}

function genSalary(companyType){
  const ranges={consulting:"25–35L",gcc:"22–30L",startup:"20–30L + equity",bfsi:"22–30L",healthcare:"20–28L",corporate:"22–28L"};
  const range=ranges[companyType]||"22–28L";
  return`SALARY NEGOTIATION — EXACT SCRIPT

WHEN THEY ASK "What's your current CTC?":
→ "I'd prefer to share that in context of the role's scope. What I can tell you is that for a Senior-level role with the ownership described in this JD, I'm targeting ${range}. Is that in the range you're working with?"

IF THEY PUSH FOR CURRENT CTC:
→ "Currently I'm in a band that reflects an IC title for what is genuinely senior-scope work — including P&L ownership and $10M program governance. The gap between my title and my contribution is part of why I'm making this move. I'm benchmarking on market rates for the level of impact, not my current number."

WHEN THEY GIVE YOU AN OFFER:
→ NEVER accept on the spot. Say: "Thank you — I appreciate the offer. Can I have 48 hours to review the full package?"
→ When you return: "I'm very excited about this role. The offer is strong, and I'd like to make this work. Based on my scope of experience and current market benchmarks, is there flexibility to move toward [TOP OF THEIR RANGE]? I want to start this the right way."

WHAT TO NEVER SAY:
• "I'm flexible" (before they give a number)
• "My current CTC is X" as your opening (it anchors them low)
• "I need at least X" (sounds desperate)
• "Other companies are offering X" (unless it's true and you're willing to walk)

TARGET RANGE FOR YOUR PROFILE: ${range}
If they say that's too high: "I understand. What the role requires is someone who's governed $10M programs, driven measurable business outcomes, and delivered CXO-level work as an IC. I'm confident that's the right benchmark. Is there room to revisit the band?"`;
}

function genReverse(company,roleTitle,companyType){
  const typeQs={
    consulting:["What does a typical engagement look like for someone in this role — what's the client industry mix?","How does the India practice contribute to global firm strategy vs operate independently?","What does the career path look like from this level — is there a clear path to principal or partner?"],
    gcc:["How does the India centre's mandate interact with the global team — is strategy set here or handed down?","What's the balance between operational execution and strategic contribution for this role?","How has the India centre's remit evolved over the last 3 years?"],
    startup:["What does success look like for this role in the first 90 days?","How does the founding team stay involved in decisions at this level?","What's the current biggest operational constraint you're solving for?"],
    bfsi:["How does this role interact with the regulatory and compliance functions?","What does the career progression look like for high performers in this team?","What's the biggest operational challenge the team is working through right now?"],
    corporate:["What does the first 90 days look like — is there a structured onboarding or is it more learn-by-doing?","How does this team measure success, and how often are those metrics reviewed?","What's the biggest unsolved challenge in this function right now?"],
  };
  const specific=typeQs[companyType]||typeQs.corporate;
  return[
    ...specific,
    `What does the person who's previously done this ${roleTitle} role well look like — what qualities did they have that made them successful here?`,
    "What are the main reasons people struggle in this role or leave within the first year?",
    "How would you describe the culture of the immediate team I'd be joining?",
    "What does the growth trajectory look like for someone who delivers strongly in this role?",
  ].map((q,i)=>({q,note:i<3?"Company-specific — ask this one":"Universal — always relevant"}));
}

function genRedFlags(bestRoleId,companyType){

    bom:["Don't use project management language ('coordinated,' 'tracked,' 'supported'). Use ownership language ('built,' 'governed,' 'owned').","Don't forget to mention post-launch ownership — BOM roles need sustained accountability, not just launches."],
    sgm:["Don't jump to solutions before showing your diagnostic framework. Consultants test this hard.","Don't quote market data you're not sure of. It's better to say 'I'd verify this' than to be wrong."],
    pom:["Don't speak only in vanity metrics (impressions, downloads). Always tie to business outcomes.","Don't show if you can't code — they'll ask. Be clear about your technical vs strategic interface."],
    cos:["Don't show too much ambition for the wrong things. CoS roles reward people who make the principal successful, not themselves.","Don't be vague about ambiguity. CoS interviews specifically probe this — have 3 concrete examples of structuring ambiguous mandates."],
  };
  const universal=[
    "Never mention current CTC in the first two rounds. It anchors every conversation downward.",
    "Never badmouth Cars24 or current management — even gently. It signals poor judgment.",
    "Don't say 'I' too much in cross-functional stories. Interviewers dock points for solo credit when team collaboration was involved.",

function gen30_60_90(roleTitle,bestRoleId){
  const plans={
    spm:{d30:"Map the program portfolio. Meet every key stakeholder. Understand the current governance framework's gaps. Deliver one quick win — a reporting improvement or a risk you caught.",d60:"Own your first major program review. Present a gap analysis of current vs ideal governance. Begin building relationships with the functions you depend on but don't control.",d90:"Have a full portfolio view with prioritised risk register. Propose one structural improvement to the program management process. Be the person stakeholders come to before escalating."},
    bom:{d30:"Map every operational process end-to-end. Identify the 3 biggest efficiency gaps. Talk to the people doing the work, not just managers. Understand the cost structure.",d60:"Own one process improvement end-to-end. Build or improve the primary operations dashboard. Establish your cadence with key vendors or partners.",d90:"Present a roadmap for the function's next 6 months. Have reduced one measurable cost or improved one measurable efficiency. Be seen as the operational owner, not a new hire."},
    sgm:{d30:"Read everything — strategy docs, board decks, market reports, competitor analysis. Map the decision-making structure. Identify which strategic questions are unresolved.",d60:"Bring one external insight that changes how the team sees a problem. Lead or co-lead one strategic workstream. Build your credibility with the analytical rigor of your output.",d90:"Own a strategic recommendation from problem to presentation. Have an opinion on the company's biggest strategic bet and be able to defend it."},
    pom:{d30:"Understand the full product funnel with data. Identify the biggest drop-off points. Map what's being measured vs what matters.",d60:"Launch or improve one growth experiment. Own one operational metric end-to-end. Build the reporting layer if it doesn't exist.",d90:"Have driven a measurable improvement in at least one key product metric. Be the go-to person for product-operations questions. Have a 6-month growth hypothesis on the table."},
    cos:{d30:"Earn trust by over-delivering on every task, no matter how small. Understand the principal's top 3 priorities. Map the political landscape — who has influence, who doesn't, and where friction exists.",d60:"Proactively surface something the principal didn't know they needed to know. Own one cross-functional initiative end-to-end. Start showing up in rooms you weren't explicitly invited to.",d90:"Be the person the principal relies on before making decisions. Have built a reputation across functions as someone who gets things done and doesn't create drama. Have one meaningful strategic contribution to your name."},
  };
  const p=plans[bestRoleId]||plans.spm;
  return`30-60-90 DAY PLAN FOR ${roleTitle.toUpperCase()}

FIRST 30 DAYS — Listen, map, identify:
${p.d30}

Say in interview: "In the first 30 days I'd focus entirely on understanding before acting — mapping the stakeholders, the current processes, and where the biggest gaps are. I wouldn't try to fix anything yet."

DAYS 31-60 — Contribute, build credibility:
${p.d60}

Say in interview: "By day 60 I'd want to have delivered one tangible contribution — not a presentation about what I'll do, but something that actually improved a number or solved a problem."

DAYS 61-90 — Own, lead, set direction:
${p.d90}

Say in interview: "By 90 days I'd want to be seen as someone who's already operating at the level the role requires — not still learning, but already delivering."

WHAT TO AVOID:
• Don't say "I'll spend the first 30 days learning" without specifics. Tell them HOW you'll learn (stakeholder interviews, data audits, process mapping).
• Don't promise deliverables you can't guarantee — "increase revenue by X" in 90 days is reckless. Say "identify the lever, build the hypothesis, begin execution."
• Don't forget to ask: "Does this align with what you'd expect from someone in this role?"`;
}

function generateJDPrep(jdText){

  return{

    intro:genIntro(company,roleTitle,companyType,bestRoleId),

        <div key={i} style={{...card,marginBottom:"8px",display:"flex",justifyContent:"space-between",gap:"10px",flexWrap:"wrap"}}>
          <div><div style={{fontSize:"12px",fontWeight:600,marginBottom:"3px"}}>{s.time}</div><div style={{fontSize:"12px",color:"#555",lineHeight:"1.5"}}>{s.task}</div></div>
          <span style={{fontSize:"10px",padding:"2px 9px",borderRadius:"999px",background:"#f0f0ea",color:"#888",whiteSpace:"nowrap",alignSelf:"flex-start"}}>{s.tag}</span>
        </div>
      ))}
    </div>
  );

  // ── JD INTERVIEW PREP ──────────────────────────────────────────────────────
  const JDPrep=()=>{
    const pr=jdPrepResult;
    if(!pr) return(
      <div className="fade">
        <div style={{marginBottom:"1rem"}}>
          <div style={{fontSize:"16px",fontWeight:700,marginBottom:"3px"}}>JD Interview Prep</div>
          <div style={{fontSize:"12px",color:"#888",lineHeight:"1.5"}}>Paste the full JD → get a complete interview prep kit: intro script, STAR answers, guesstimates, culture Q&A, salary negotiation, reverse questions, red flags, and a 30-60-90 plan. All based on your actual experience.</div>
        </div>
        <div style={{fontSize:"11px",color:"#aaa",marginBottom:"8px",lineHeight:"1.5"}}>
          Copy everything from the job page (Ctrl+A, Ctrl+C) and paste below. The more text, the better the tailoring.
        </div>
        <textarea value={jdPrepText} onChange={e=>setJdPrepText(e.target.value)} placeholder="Paste the full job description here — company name, about the company, role title, responsibilities, requirements, qualifications, culture…" style={{...inp,minHeight:"180px",marginBottom:"12px"}}/>
        <button onClick={()=>{if(!jdPrepText.trim()){showToast("Paste a JD first");return;}setJdPrepResult(generateJDPrep(jdPrepText));setPrepCat("intro");setOpenPrepQ(null);}} style={btnP("#1a1a1a")}>Generate full prep kit →</button>
      </div>
    );

    const catData={
      intro:{label:"60-sec Intro",content:<div style={{background:"#f9f9f7",borderRadius:"8px",padding:"14px",borderLeft:"3px solid #1a1a1a",whiteSpace:"pre-wrap",fontSize:"12px",lineHeight:"1.75",color:"#333"}}>{pr.intro}</div>},
      star:{label:`STAR Questions (${pr.star.length})`,content:<div>{pr.star.map((q,i)=>{const open=openPrepQ===`s${i}`;return<div key={i} style={{...card,marginBottom:"8px",cursor:"pointer"}} onClick={()=>setOpenPrepQ(open?null:`s${i}`)}>
        <div style={{display:"flex",gap:"8px",justifyContent:"space-between"}}>
          <div style={{fontSize:"13px",fontWeight:600,flex:1,lineHeight:"1.4"}}><span style={{color:"#aaa",fontSize:"11px",marginRight:"6px"}}>Q{i+1}</span>{q.q}</div>
          <span style={{fontSize:"14px",color:"#aaa",transform:open?"rotate(90deg)":"none",transition:"transform .2s"}}>›</span>
        </div>
        {open&&<div style={{marginTop:"12px",borderTop:"0.5px solid #f0f0ea",paddingTop:"12px"}}>
          <div style={{whiteSpace:"pre-wrap",fontSize:"12px",lineHeight:"1.75",color:"#333",background:"#f9f9f7",borderRadius:"8px",padding:"12px",borderLeft:"3px solid #1D9E75",marginBottom:"8px"}}>{q.a}</div>
          <div style={{background:"#fffbee",border:"0.5px solid #f0c060",borderRadius:"6px",padding:"8px 10px",fontSize:"11px",color:"#7a5500"}}><strong>Tip: </strong>{q.tip}</div>
        </div>}
      </div>;})}</div>},
      guesstimates:{label:"Guesstimates",content:<div>{pr.guesstimates.map((g,i)=>{const open=openPrepQ===`g${i}`;return<div key={i} style={{...card,marginBottom:"8px",cursor:"pointer"}} onClick={()=>setOpenPrepQ(open?null:`g${i}`)}>
        <div style={{display:"flex",gap:"8px",justifyContent:"space-between"}}>
          <div style={{fontSize:"13px",fontWeight:600,flex:1,lineHeight:"1.4"}}>{g.q}</div>
          <span style={{fontSize:"14px",color:"#aaa",transform:open?"rotate(90deg)":"none",transition:"transform .2s"}}>›</span>
        </div>
        {open&&<div style={{marginTop:"12px",borderTop:"0.5px solid #f0f0ea",paddingTop:"12px",whiteSpace:"pre-wrap",fontSize:"12px",lineHeight:"1.75",color:"#333",background:"#f9f9f7",borderRadius:"8px",padding:"12px",borderLeft:"3px solid #534AB7"}}>{g.approach}</div>}
      </div>;})}</div>},
      culture:{label:"Culture & Values",content:<div>
        <div style={{...card,background:pr.bestRoleId?ROLES_T.find(r=>r.id===pr.bestRoleId)?.color+"0d":"#f9f9f7",marginBottom:"1rem"}}>
          <div style={{fontSize:"11px",fontWeight:700,color:"#666",textTransform:"uppercase",letterSpacing:".04em",marginBottom:"4px"}}>Company type: {pr.companyType}</div>
          <div style={{fontSize:"12px",color:"#555",lineHeight:"1.6"}}>{pr.culture.typeNote}</div>
        </div>
        {pr.culture.questions.map((q,i)=>{const open=openPrepQ===`c${i}`;return<div key={i} style={{...card,marginBottom:"8px",cursor:"pointer"}} onClick={()=>setOpenPrepQ(open?null:`c${i}`)}>
          <div style={{display:"flex",gap:"8px",justifyContent:"space-between"}}>
            <div style={{fontSize:"13px",fontWeight:600,flex:1,lineHeight:"1.4"}}>{q.q}</div>
            <span style={{fontSize:"14px",color:"#aaa",transform:open?"rotate(90deg)":"none",transition:"transform .2s"}}>›</span>
          </div>
          {open&&<div style={{marginTop:"12px",borderTop:"0.5px solid #f0f0ea",paddingTop:"12px"}}>
            <div style={{whiteSpace:"pre-wrap",fontSize:"12px",lineHeight:"1.75",color:"#333",background:"#f9f9f7",borderRadius:"8px",padding:"12px",borderLeft:"3px solid #993C1D",marginBottom:"8px"}}>{q.script}</div>
            <div style={{background:"#fffbee",border:"0.5px solid #f0c060",borderRadius:"6px",padding:"8px 10px",fontSize:"11px",color:"#7a5500"}}><strong>Tip: </strong>{q.tip}</div>
          </div>}
        </div>;})}
      </div>},
      salary:{label:"Salary Script",content:<div style={{background:"#f9f9f7",borderRadius:"8px",padding:"14px",borderLeft:"3px solid #1D9E75",whiteSpace:"pre-wrap",fontSize:"12px",lineHeight:"1.75",color:"#333"}}>{pr.salary}</div>},
      reverse:{label:"Reverse Questions",content:<div>
        <div style={{fontSize:"12px",color:"#888",marginBottom:"12px",lineHeight:"1.5"}}>Ask 3-4 of these. Always end with a question — it signals genuine interest and gives you information. Never ask about salary or leave in the first round.</div>
        {pr.reverse.map((r,i)=>(
          <div key={i} style={{...card,marginBottom:"8px",display:"flex",gap:"12px",alignItems:"flex-start"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:"13px",fontWeight:500,marginBottom:"3px"}}>{r.q}</div>
              <div style={{fontSize:"11px",color:"#aaa"}}>{r.note}</div>
            </div>
          </div>
        ))}
      </div>},
      redflags:{label:"Red Flags",content:<div>
        <div style={{fontSize:"12px",color:"#888",marginBottom:"12px",lineHeight:"1.5"}}>Things NOT to say or do. Print this and read it the morning of the interview.</div>
        {pr.redflags.map((f,i)=>(
          <div key={i} style={{...card,marginBottom:"8px",background:"#FCEBEB",border:"0.5px solid #F09595",display:"flex",gap:"10px"}}>
            <span style={{fontSize:"16px",flexShrink:0,marginTop:"1px"}}>✕</span>
            <div style={{fontSize:"12px",color:"#A32D2D",lineHeight:"1.6"}}>{f}</div>
          </div>
        ))}
      </div>},
      plan:{label:"30-60-90 Plan",content:<div style={{background:"#f9f9f7",borderRadius:"8px",padding:"14px",borderLeft:"3px solid #185FA5",whiteSpace:"pre-wrap",fontSize:"12px",lineHeight:"1.75",color:"#333"}}>{pr.plan}</div>},
    };

    return(
      <div className="fade">
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"1rem",gap:"8px",flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:"15px",fontWeight:700}}>Prep for <span style={{color:ROLES_T.find(r=>r.id===pr.bestRoleId)?.color||"#1a1a1a"}}>{pr.roleTitle}</span></div>
            <div style={{fontSize:"12px",color:"#888"}}>{pr.company}  ·  {pr.companyType}  ·  Best resume: {pr.bestRoleLabel}</div>
          </div>
          <button onClick={()=>{setJdPrepResult(null);setJdPrepText("");}} style={btnO}>← New JD</button>
        </div>
        <div style={{...card,background:"#EAF3DE",border:"0.5px solid #a0c878",marginBottom:"1rem"}}>
          <div style={{fontSize:"11px",fontWeight:700,color:"#27500A",textTransform:"uppercase",letterSpacing:".04em",marginBottom:"4px"}}>Recommended resume version</div>
          <div style={{fontSize:"13px",color:"#27500A",fontWeight:600,marginBottom:"4px"}}>{pr.bestRoleLabel}</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginTop:"6px"}}>
            {ROLES_T.map(r=>{const s=pr.scores[r.id]||0;const max=Math.max(...Object.values(pr.scores));return<span key={r.id} style={{fontSize:"11px",padding:"2px 9px",borderRadius:"999px",background:r.id===pr.bestRoleId?r.color:"#f0f0ea",color:r.id===pr.bestRoleId?"#fff":"#888"}}>{r.label.split(" ").slice(0,2).join(" ")} {max>0?Math.round((s/max)*100)+"%":""}</span>;})}
          </div>
        </div>
        <div style={{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"1rem"}}>
          {PREP_CATS.map(([id,label])=>(
            <button key={id} onClick={()=>{setPrepCat(id);setOpenPrepQ(null);}} style={{fontSize:"12px",padding:"6px 13px",borderRadius:"8px",border:prepCat===id?"1.5px solid #1a1a1a":"0.5px solid #d3d1c7",background:prepCat===id?"#1a1a1a":"transparent",color:prepCat===id?"#fff":"#555",cursor:"pointer",fontWeight:prepCat===id?600:400}}>
              {label}
            </button>
          ))}
        </div>
        <div className="fade" key={prepCat}>{catData[prepCat]?.content}</div>
      </div>
    );
  };

  // ── RESUME TAILOR ──────────────────────────────────────────────────────────
  const ResumeTailor=()=>{
    if(tStep==="result"&&tResult){
      const totalChanged=(tResult.sections||[]).reduce((a,s)=>a+(s.bullets||[]).filter(b=>b.changed).length,0);
      return<div className="fade">
        <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:"1rem",flexWrap:"wrap",gap:"8px"}}>
          <div>
            <div style={{fontSize:"15px",fontWeight:700}}>Tailored for <span style={{color:tRole.color}}>{tResult.role_title}</span></div>
            <div style={{fontSize:"12px",color:"#888"}}>{tResult.company_name}  ·  {tRole.label}</div>
          </div>
          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>
            <button onClick={()=>{setTStep("input");setTResult(null);setDocxUrl(null);}} style={btnO}>← New JD</button>
            <button onClick={downloadDocx} disabled={downloading} style={{...btnP(tRole.color),opacity:downloading?0.7:1}}>{downloading?"Generating…":"Download .docx"}</button>
          </div>
        </div>
        {docxUrl&&<div style={{...card,background:"#EAF3DE",border:"0.5px solid #a0c878",marginBottom:"1rem",display:"flex",alignItems:"center",gap:"12px"}}>
          <div style={{flex:1,fontSize:"12px",color:"#27500A"}}>On mobile, tap the button to open the document, then use your browser's share/download option to save it.</div>
          <a href={docxUrl.url} download={docxUrl.fname} style={{...btnP("#27500A"),textDecoration:"none",fontSize:"12px"}}>Tap to save .docx</a>
        </div>}
        <div style={{display:"flex",gap:"6px",marginBottom:"1rem",flexWrap:"wrap"}}>
          {[["overview","Overview"],["bullets","Bullets"],["keywords","Keywords"]].map(([v,l])=>(
            <button key={v} onClick={()=>setTTab(v)} style={{fontSize:"12px",padding:"6px 13px",borderRadius:"8px",border:tTab===v?`1.5px solid ${tRole.color}`:"0.5px solid #d3d1c7",background:tTab===v?tRole.color+"22":"transparent",color:tTab===v?tRole.color:"#555",cursor:"pointer"}}>{l}</button>
          ))}
        </div>
        {tTab==="overview"&&<div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"8px",marginBottom:"1rem"}}>
            {[{n:`${tResult.match_score}%`,l:"ATS match",c:tResult.match_score>=80?"#1D9E75":tResult.match_score>=60?"#EF9F27":"#E24B4A"},{n:totalChanged,l:"Bullets reordered",c:tRole.color},{n:(tResult.missing_keywords||[]).length,l:"Keywords to add",c:"#E24B4A"}].map((m,i)=>(
              <div key={i} style={{background:"#f5f5f0",borderRadius:"8px",padding:"12px",textAlign:"center"}}><div style={{fontSize:"24px",fontWeight:700,color:m.c}}>{m.n}</div><div style={{fontSize:"11px",color:"#888",marginTop:"2px"}}>{m.l}</div></div>
            ))}
          </div>
          {tResult.top_tip&&<div style={{...card,background:"#fffbee",border:"0.5px solid #f0c060"}}><div style={{fontSize:"10px",fontWeight:700,color:"#a07010",textTransform:"uppercase",letterSpacing:".05em",marginBottom:"6px"}}>Top tip</div><div style={{fontSize:"13px",color:"#7a5500",lineHeight:"1.6"}}>{tResult.top_tip}</div></div>}
          {tResult.roleRecs&&<div style={card}><div style={{fontSize:"11px",fontWeight:600,color:"#888",marginBottom:"8px",textTransform:"uppercase",letterSpacing:".05em"}}>Resume version scores for this JD</div>{tResult.roleRecs.map(r=><div key={r.id} style={{marginBottom:"7px"}}><div style={{display:"flex",alignItems:"center",gap:"8px"}}><span style={{fontSize:"11px",color:r.id===tRoleId?r.color:"#666",fontWeight:r.id===tRoleId?700:400,width:"180px",flexShrink:0}}>{r.label.split(" ").slice(0,3).join(" ")}{r.id===tRoleId?" ← current":""}</span><div style={{flex:1,height:"5px",background:"#f0f0ea",borderRadius:"3px",overflow:"hidden"}}><div style={{width:r.matchPct+"%",height:"100%",background:r.id===tRoleId?r.color:"#d3d1c7",borderRadius:"3px"}}/></div><span style={{fontSize:"11px",color:"#888",width:"32px",textAlign:"right"}}>{r.matchPct}%</span></div></div>)}</div>}
        </div>}
        {tTab==="bullets"&&<div>
          <div style={{fontSize:"12px",color:"#888",marginBottom:"1rem",lineHeight:"1.5"}}>Most JD-relevant bullets moved to top of each section. Metrics kept exact.</div>
          {(tResult.sections||[]).map((sec,si)=>(
            <div key={si} style={{marginBottom:"1.25rem"}}>
              <div style={{fontSize:"12px",fontWeight:700,color:tRole.color,marginBottom:"8px",paddingLeft:"8px",borderLeft:`2px solid ${tRole.color}`}}>{sec.role}{sec.dates?`  ·  ${sec.dates}`:""}</div>
              {(sec.bullets||[]).map((b,bi)=>(
                <div key={bi} style={{...card,marginBottom:"6px",display:"flex",gap:"8px",alignItems:"flex-start"}}>
                  <div style={{fontSize:"12px",color:b.changed?"#aaa":"#1a1a1a",lineHeight:"1.6",flex:1,textDecoration:b.changed?"none":"none"}}>{b.changed?"↑ ":""}{b.original}</div>
                  <span style={{fontSize:"10px",padding:"2px 8px",borderRadius:"999px",background:b.changed?"#EAF3DE":"#f1efea",color:b.changed?"#27500A":"#888",fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>{b.changed?"Moved up":"Same"}</span>
                </div>
              ))}
            </div>
          ))}
        </div>}
        {tTab==="keywords"&&<div>
          <div style={secLbl}>ATS keywords from this JD</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"1.25rem"}}>{(tResult.ats_keywords||[]).map((k,i)=><span key={i} style={{fontSize:"12px",padding:"4px 12px",borderRadius:"999px",background:tRole.color+"11",color:tRole.color,border:`0.5px solid ${tRole.color}55`}}>{k}</span>)}</div>
          <div style={secLbl}>Missing from your resume — weave these in</div>
          {(tResult.missing_keywords||[]).length===0
            ?<div style={{fontSize:"12px",color:"#1D9E75",padding:"8px 0"}}>No critical keywords missing — strong match!</div>
            :<div style={{display:"flex",flexWrap:"wrap",gap:"6px",marginBottom:"1rem"}}>{tResult.missing_keywords.map((k,i)=><span key={i} style={{fontSize:"12px",padding:"4px 12px",borderRadius:"999px",background:"#FCEBEB",color:"#A32D2D",border:"0.5px solid #F09595"}}>{k}</span>)}</div>
          }
        </div>}
      </div>;
    }
    return<div className="fade">
      <div style={{marginBottom:"1.25rem"}}>
        <div style={{fontSize:"16px",fontWeight:700,marginBottom:"3px"}}>Resume Tailor</div>
        <div style={{fontSize:"12px",color:"#888"}}>Paste any JD → scores all 5 resume versions, recommends the best, reorders your bullets by relevance, downloads .docx.</div>
      </div>
      <div style={secLbl}>Step 1 — Choose resume version (or let it recommend)</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:"6px",marginBottom:"1.25rem"}}>
        {ROLES_T.map(r=><div key={r.id} onClick={()=>setTRoleId(r.id)} style={{border:tRoleId===r.id?`1.5px solid ${r.color}`:"0.5px solid #e0deda",borderRadius:"8px",padding:"10px 12px",background:tRoleId===r.id?r.color+"11":"#fff",cursor:"pointer"}}>
          <div style={{fontSize:"12px",fontWeight:tRoleId===r.id?700:400,color:tRoleId===r.id?r.color:"#1a1a1a"}}>{r.label}</div>
        </div>)}
      </div>
      <div style={{fontSize:"11px",color:"#aaa",marginBottom:"8px"}}>Not sure which to pick? Paste the JD and hit "Tailor" — it will score all 5 versions and recommend the best one automatically.</div>
      <div style={secLbl}>Step 2 — Paste the job description</div>
      <textarea value={jdTailorText} onChange={e=>setJdTailorText(e.target.value)} placeholder="Paste the full job description here…" style={{...inp,minHeight:"140px",marginBottom:"12px"}}/>
      <button onClick={runTailorOffline} style={btnP(tRole.color)}>Tailor + recommend version →</button>
    </div>;
  };

  // ── SETTINGS MODAL ─────────────────────────────────────────────────────────
  const SettingsModal=()=>(
    <div className="modal-bg" onClick={()=>setShowSettings(false)}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:"16px",fontWeight:700,marginBottom:"4px"}}>Settings & Sync</div>
        <div style={{fontSize:"12px",color:"#888",marginBottom:"1.25rem",lineHeight:"1.5"}}>
          Sync status: <strong style={{color:syncStatus==="synced"?"#1D9E75":syncStatus==="syncing"?"#EF9F27":syncStatus==="error"?"#A32D2D":"#888"}}>{syncStatus==="local"?"Local only (not synced)":syncStatus==="syncing"?"Syncing…":syncStatus==="synced"?"Synced to Google Sheets":"Sync error — check URL"}</strong>
        </div>
        <div style={{fontSize:"13px",fontWeight:600,marginBottom:"6px"}}>Google Sheets sync URL</div>
        <div style={{fontSize:"12px",color:"#888",marginBottom:"8px",lineHeight:"1.5"}}>Paste your Google Apps Script Web App URL here to sync data across all devices. See setup instructions below.</div>
        <input value={tempUrl} onChange={e=>setTempUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..." style={{...inp,marginBottom:"10px"}}/>
        <div style={{display:"flex",gap:"8px",marginBottom:"1.25rem"}}>
          <button onClick={()=>{saveScriptUrl(tempUrl);showToast("URL saved! Syncing…");setShowSettings(false);}} style={btnP("#1a1a1a")}>Save & sync</button>
          {scriptUrl&&<button onClick={()=>{saveScriptUrl("");showToast("Sync disabled");}} style={btnO}>Remove</button>}
        </div>
        <div style={{background:"#f5f5f0",borderRadius:"10px",padding:"1rem"}}>
          <div style={{fontSize:"12px",fontWeight:700,marginBottom:"8px"}}>Setup guide (10 min, free)</div>
          {[
            {n:"1",t:"Create Google Sheet",d:"Go to sheets.google.com → create a new blank sheet → name it anything (e.g. 'Job HQ Data')"},
            {n:"2",t:"Open Apps Script",d:"In the sheet: Extensions → Apps Script → delete all existing code"},
            {n:"3",t:"Paste the script",d:"Copy the Apps Script code from the instructions file provided with this tool → paste it → click Save"},
            {n:"4",t:"Deploy as Web App",d:"Click Deploy → New deployment → Type: Web app → Execute as: Me → Who has access: Anyone → Deploy → Copy the Web app URL"},
            {n:"5",t:"Paste URL here",d:"Paste the URL above and click Save & sync. Done — your data now syncs to Google Sheets across all devices."},
          ].map((s,i)=>(
            <div key={i} style={{display:"flex",gap:"10px",marginBottom:"10px"}}>
              <div style={{width:"22px",height:"22px",borderRadius:"50%",background:"#1a1a1a",color:"#fff",fontSize:"11px",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{s.n}</div>
              <div><div style={{fontSize:"12px",fontWeight:600,marginBottom:"2px"}}>{s.t}</div><div style={{fontSize:"11px",color:"#888",lineHeight:"1.5"}}>{s.d}</div></div>
            </div>
          ))}
        </div>
        <button onClick={()=>setShowSettings(false)} style={{...btnO,marginTop:"1rem",width:"100%",textAlign:"center"}}>Close</button>
      </div>
    </div>
  );

  return(
    <div>
      {toast&&<div style={{position:"fixed",bottom:"24px",left:"50%",transform:"translateX(-50%)",background:"#1a1a1a",color:"#fff",padding:"8px 20px",borderRadius:"999px",fontSize:"12px",zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 4px 12px rgba(0,0,0,.2)"}}>{toast}</div>}
      {showSettings&&<SettingsModal/>}

      <div style={{marginBottom:"1.25rem",display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"8px"}}>
        <div>
          <div style={{fontSize:"19px",fontWeight:700,marginBottom:"2px"}}>Job Switch HQ</div>
          <div style={{fontSize:"11px",color:"#888"}}>Gunadeep Sai  ·  IIT BHU  ·  Cars24  ·  Hyderabad  ·  Target: 20–35L</div>
        </div>
        <button onClick={()=>setShowSettings(true)} style={{...btnO,fontSize:"18px",padding:"4px 10px",lineHeight:1}} title="Settings & Sync">⚙</button>
      </div>

      <div style={{display:"flex",gap:"4px",flexWrap:"wrap",marginBottom:"1.25rem",borderBottom:"1px solid #e8e6e0",paddingBottom:"10px"}}>
        {TABS.map(([v,l])=>{
          const isAdd=v==="add";const active=tab===v;
          return<button key={v} onClick={()=>{if(isAdd){resetForm();setEditId(null);}setTab(v);}} style={{fontSize:"12px",padding:"6px 12px",borderRadius:"8px",border:active?"1.5px solid #1a1a1a":isAdd?"0.5px solid #d3d1c7":"none",background:active?"#1a1a1a":isAdd?"transparent":"transparent",color:active?"#fff":isAdd?"#555":"#888",cursor:"pointer",fontWeight:active?600:400}}>{l}</button>;
        })}
      </div>

      {tab==="dashboard"&&<Dashboard/>}
      {tab==="applications"&&<Applications/>}
      {tab==="add"&&<AddForm/>}
      {tab==="jdprep"&&<JDPrep/>}
      {tab==="tailor"&&<ResumeTailor/>}
      {tab==="benchmarks"&&<Benchmarks/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
